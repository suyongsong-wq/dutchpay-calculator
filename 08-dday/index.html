<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-DAY // 펑크 카운터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    /* ========================================
       펑크 스타일 커스텀 CSS
       Tailwind로 표현 불가한 효과(하드섀도우/글리치/폰트)
       ======================================== */
    :root {
      --punk-pink: #ff2e88;
      --punk-green: #39ff14;
      --punk-yellow: #faff00;
      --punk-cyan: #00f0ff;
    }
    body {
      background-color: #050505;
      /* 노이즈 + 그리드 배경 */
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px),
        radial-gradient(circle at 20% 20%, rgba(255,46,136,0.12), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(57,255,20,0.10), transparent 45%);
    }
    .font-anton { font-family: 'Anton', sans-serif; }
    .font-archivo { font-family: 'Archivo Black', sans-serif; }
    .font-bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }

    /* 하드 섀도우 (흐림 없는 offset 그림자) */
    .hard-shadow { box-shadow: 8px 8px 0 0 #000; }
    .hard-shadow-pink { box-shadow: 8px 8px 0 0 var(--punk-pink); }
    .hard-shadow-green { box-shadow: 6px 6px 0 0 var(--punk-green); }
    .hard-shadow-sm { box-shadow: 4px 4px 0 0 #000; }
    .hard-shadow-press:active { box-shadow: 2px 2px 0 0 #000; transform: translate(4px,4px); }

    /* 글리치 텍스트 효과 */
    .glitch {
      position: relative;
      text-shadow: 3px 0 var(--punk-pink), -3px 0 var(--punk-cyan);
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
    }
    .glitch::before {
      color: var(--punk-cyan);
      animation: glitch-anim 2.5s infinite linear alternate-reverse;
      clip-path: inset(0 0 60% 0);
    }
    .glitch::after {
      color: var(--punk-pink);
      animation: glitch-anim2 3s infinite linear alternate-reverse;
      clip-path: inset(60% 0 0 0);
    }
    @keyframes glitch-anim {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, 2px); }
      40% { transform: translate(-3px, -2px); }
      60% { transform: translate(3px, 2px); }
      80% { transform: translate(3px, -2px); }
      100% { transform: translate(0); }
    }
    @keyframes glitch-anim2 {
      0% { transform: translate(0); }
      25% { transform: translate(3px, -1px); }
      50% { transform: translate(-3px, 1px); }
      75% { transform: translate(2px, 2px); }
      100% { transform: translate(0); }
    }

    /* 흔들림(shake) */
    @keyframes shake {
      0%,100% { transform: translateX(0) rotate(-1deg); }
      25% { transform: translateX(-3px) rotate(-1deg); }
      75% { transform: translateX(3px) rotate(-1deg); }
    }
    .shake-hover:hover { animation: shake 0.3s infinite; }

    /* 깜빡임(blink) for 콜론 */
    @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0.15; } }
    .blink { animation: blink 1s steps(1) infinite; }

    /* 네온 글로우 펄스 */
    @keyframes neon-pulse {
      0%,100% { text-shadow: 0 0 4px currentColor, 0 0 12px currentColor; }
      50% { text-shadow: 0 0 8px currentColor, 0 0 24px currentColor; }
    }
    .neon-pulse { animation: neon-pulse 2s ease-in-out infinite; }

    /* 스캔라인 오버레이 */
    .scanlines::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.25) 0px, rgba(0,0,0,0.25) 1px, transparent 2px, transparent 4px);
      z-index: 50;
      mix-blend-mode: multiply;
    }

    /* 기울임 유틸 */
    .skew-left { transform: rotate(-2deg); }
    .skew-right { transform: rotate(1.5deg); }

    /* date input 다크 보정 */
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }
  </style>
</head>
<body class="scanlines text-white min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    const STORAGE_KEY = "punk-dday-list-v1";
    const NEON = ["pink", "green", "yellow", "cyan"];

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // 펑크 버튼
    function PunkButton({ children, onClick, variant = "primary", size = "md", type = "button", className = "", disabled = false, ...rest }) {
      const variants = {
        primary: "bg-[var(--punk-pink)] text-black border-black",
        green: "bg-[var(--punk-green)] text-black border-black",
        yellow: "bg-[var(--punk-yellow)] text-black border-black",
        ghost: "bg-black text-white border-[var(--punk-pink)]",
        danger: "bg-black text-[var(--punk-pink)] border-[var(--punk-pink)]",
      };
      const sizes = {
        sm: "px-3 py-1 text-sm",
        md: "px-5 py-2 text-base",
        lg: "px-7 py-3 text-lg",
      };
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`font-archivo uppercase tracking-wider border-4 hard-shadow-sm hard-shadow-press transition-transform select-none
            ${variants[variant]} ${sizes[size]} ${disabled ? "opacity-40 cursor-not-allowed" : "hover:-rotate-1"} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    // 펑크 인풋
    function PunkInput({ label, error, className = "", ...rest }) {
      return (
        <label className="block w-full">
          {label && (
            <span className="font-bebas text-2xl uppercase tracking-widest text-[var(--punk-green)] block mb-1">
              {label}
            </span>
          )}
          <input
            className={`w-full bg-black text-white border-4 border-white px-4 py-3 font-bebas text-xl tracking-wide
              placeholder-gray-500 outline-none focus:border-[var(--punk-pink)] focus:hard-shadow-pink transition-all
              ${error ? "border-[var(--punk-pink)]" : ""} ${className}`}
            {...rest}
          />
          {error && (
            <span className="block mt-1 font-bebas text-lg text-[var(--punk-pink)] uppercase tracking-wide shake-hover">
              ⚠ {error}
            </span>
          )}
        </label>
      );
    }

    // 컬러 선택 스와치
    function ColorPicker({ value, onChange }) {
      const map = {
        pink: "var(--punk-pink)", green: "var(--punk-green)",
        yellow: "var(--punk-yellow)", cyan: "var(--punk-cyan)",
      };
      return (
        <div>
          <span className="font-bebas text-2xl uppercase tracking-widest text-[var(--punk-green)] block mb-1">컬러</span>
          <div className="flex gap-3">
            {NEON.map((c) => (
              <button
                key={c}
                type="button"
                aria-label={`색상 ${c}`}
                onClick={() => onChange(c)}
                className={`w-10 h-10 border-4 transition-transform hover:scale-110
                  ${value === c ? "border-white scale-110 hard-shadow-sm" : "border-gray-700"}`}
                style={{ backgroundColor: map[c] }}
              />
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧮 D-day 계산 유틸
    // ========================================

    // 자정 기준 D-day 숫자 계산 (오늘 0시 vs 목표 날짜 0시)
    function getDdayCount(targetISO) {
      const target = new Date(targetISO);
      const now = new Date();
      const t0 = new Date(target.getFullYear(), target.getMonth(), target.getDate());
      const n0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diffDays = Math.round((t0 - n0) / 86400000);
      return diffDays; // 양수: 미래(D-n), 0: 오늘, 음수: 과거(D+n)
    }

    function formatDdayLabel(count) {
      if (count > 0) return `D-${count}`;
      if (count === 0) return "D-DAY";
      return `D+${Math.abs(count)}`;
    }

    // 실시간 시:분:초 분해 (now ~ target 시각 차이)
    function breakdown(targetISO, nowMs) {
      const target = new Date(targetISO).getTime();
      let diff = target - nowMs;
      const past = diff < 0;
      diff = Math.abs(diff);
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);
      return { days, hours, minutes, seconds, past };
    }

    const pad = (n) => String(n).padStart(2, "0");

    // ========================================
    // 🧩 D-day 카드 컴포넌트
    // ========================================

    function DdayCard({ item, nowMs, onDelete }) {
      const colorMap = {
        pink: "var(--punk-pink)", green: "var(--punk-green)",
        yellow: "var(--punk-yellow)", cyan: "var(--punk-cyan)",
      };
      const accent = colorMap[item.color] || colorMap.pink;

      const count = useMemo(() => getDdayCount(item.target), [item.target, nowMs]);
      const ddayText = formatDdayLabel(count);
      const bd = breakdown(item.target, nowMs);

      const targetDate = new Date(item.target);
      const dateLabel = targetDate.toLocaleString("ko-KR", {
        year: "numeric", month: "long", day: "numeric",
        weekday: "short", hour: "2-digit", minute: "2-digit",
      });

      const skew = item.id % 2 === 0 ? "skew-left" : "skew-right";

      const units = [
        { v: bd.days, label: "일" },
        { v: bd.hours, label: "시" },
        { v: bd.minutes, label: "분" },
        { v: bd.seconds, label: "초" },
      ];

      return (
        <article
          className={`relative bg-black border-4 border-white p-6 hard-shadow ${skew} transition-transform hover:rotate-0 hover:scale-[1.02]`}
          style={{ borderColor: accent }}
        >
          {/* 삭제 버튼 */}
          <button
            onClick={() => onDelete(item.id)}
            aria-label="삭제"
            className="absolute -top-3 -right-3 w-9 h-9 bg-black text-white border-4 border-white font-archivo text-lg
              flex items-center justify-center hover:bg-[var(--punk-pink)] hover:text-black transition-colors hard-shadow-sm z-10"
          >
            ✕
          </button>

          {/* 라벨 */}
          <h2 className="font-anton text-3xl sm:text-4xl uppercase tracking-wide break-words mb-1" style={{ color: accent }}>
            {item.label}
          </h2>
          <p className="font-bebas text-base sm:text-lg text-gray-400 tracking-wider mb-4">{dateLabel}</p>

          {/* 메인 D-day */}
          <div className="text-center my-4">
            <span
              className="glitch font-anton text-6xl sm:text-7xl md:text-8xl uppercase leading-none inline-block"
              data-text={ddayText}
              style={{ color: accent }}
            >
              {ddayText}
            </span>
          </div>

          {/* 실시간 카운트다운 */}
          <div className="grid grid-cols-4 gap-2 mt-5">
            {units.map((u, i) => (
              <div key={u.label} className="flex flex-col items-center">
                <div className="w-full bg-black border-4 border-white text-center py-2 font-anton text-2xl sm:text-3xl tabular-nums"
                     style={{ color: accent }}>
                  {i === 0 ? u.v : pad(u.v)}
                </div>
                <span className="font-bebas text-lg sm:text-xl uppercase tracking-widest text-white mt-1">{u.label}</span>
              </div>
            ))}
          </div>

          {/* 상태 표시줄 */}
          <div className="mt-4 flex items-center justify-center gap-2 font-bebas text-xl uppercase tracking-widest"
               style={{ color: accent }}>
            <span className="blink">●</span>
            {bd.past ? "이미 지난 날짜 // D+카운트 진행중" : "실시간 카운트다운 가동중"}
          </div>
        </article>
      );
    }

    // ========================================
    // 🧩 입력 폼 컴포넌트
    // ========================================

    function DdayForm({ onAdd }) {
      const [label, setLabel] = useState("");
      const [target, setTarget] = useState("");
      const [color, setColor] = useState("pink");
      const [errors, setErrors] = useState({});

      const validate = () => {
        const e = {};
        if (!label.trim()) e.label = "이름을 입력하세요 (예: 수능, 기념일)";
        else if (label.trim().length > 20) e.label = "이름은 20자 이내로 입력하세요";
        if (!target) e.target = "목표 날짜와 시간을 선택하세요";
        else if (isNaN(new Date(target).getTime())) e.target = "올바른 날짜 형식이 아닙니다";
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const submit = (ev) => {
        ev.preventDefault();
        if (!validate()) return;
        onAdd({
          id: Date.now(),
          label: label.trim(),
          target: new Date(target).toISOString(),
          color,
        });
        setLabel("");
        setTarget("");
        setColor("pink");
        setErrors({});
      };

      return (
        <form
          onSubmit={submit}
          className="bg-black border-4 border-[var(--punk-pink)] p-6 hard-shadow-pink skew-right space-y-5"
        >
          <h2 className="font-anton text-3xl sm:text-4xl uppercase text-[var(--punk-yellow)] neon-pulse">
            + 새 D-DAY 추가
          </h2>
          <PunkInput
            label="이름"
            placeholder="예: 수능, 전역, 기념일"
            value={label}
            onChange={(e) => setLabel(e.target.value)}
            error={errors.label}
            maxLength={20}
          />
          <PunkInput
            label="목표 날짜 / 시간"
            type="datetime-local"
            value={target}
            onChange={(e) => setTarget(e.target.value)}
            error={errors.target}
          />
          <ColorPicker value={color} onChange={setColor} />
          <PunkButton type="submit" variant="primary" size="lg" className="w-full shake-hover">
            ⚡ 카운트 시작
          </PunkButton>
        </form>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      const [items, setItems] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });

      // 실시간 시계 (1초마다 갱신) - useEffect cleanup으로 interval 정리
      const [nowMs, setNowMs] = useState(() => Date.now());
      useEffect(() => {
        const id = setInterval(() => setNowMs(Date.now()), 1000);
        return () => clearInterval(id); // cleanup
      }, []);

      // localStorage 저장
      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        } catch {}
      }, [items]);

      const addItem = useCallback((item) => {
        setItems((prev) => [item, ...prev]);
      }, []);

      const deleteItem = useCallback((id) => {
        setItems((prev) => prev.filter((it) => it.id !== id));
      }, []);

      // 정렬: 미래의 가까운 순 -> 과거
      const sorted = useMemo(() => {
        return [...items].sort((a, b) => {
          const ca = getDdayCount(a.target);
          const cb = getDdayCount(b.target);
          const fa = ca >= 0 ? 0 : 1;
          const fb = cb >= 0 ? 0 : 1;
          if (fa !== fb) return fa - fb;
          return fa === 0 ? ca - cb : cb - ca;
        });
      }, [items, nowMs]);

      const clearAll = () => {
        if (items.length && window.confirm("모든 D-day를 삭제할까요? 되돌릴 수 없습니다.")) {
          setItems([]);
        }
      };

      return (
        <div className="max-w-6xl mx-auto px-4 py-8 sm:py-12">
          {/* 헤더 */}
          <header className="mb-10 text-center">
            <h1
              className="glitch font-anton text-6xl sm:text-7xl md:text-8xl uppercase leading-none text-white inline-block shake-hover"
              data-text="D-DAY"
            >
              D-DAY
            </h1>
            <p className="font-bebas text-2xl sm:text-3xl uppercase tracking-[0.3em] text-[var(--punk-green)] mt-2 neon-pulse">
              PUNK COUNTDOWN MACHINE
            </p>
            <div className="mt-3 inline-block bg-[var(--punk-yellow)] text-black font-archivo text-sm uppercase px-4 py-1 border-4 border-black -rotate-2 hard-shadow-sm">
              {new Date(nowMs).toLocaleTimeString("ko-KR")} // 가동중
            </div>
          </header>

          {/* 폼 + 리스트 그리드 */}
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
            {/* 입력 폼 */}
            <div className="lg:col-span-4">
              <div className="lg:sticky lg:top-8">
                <DdayForm onAdd={addItem} />
                {items.length > 0 && (
                  <div className="mt-5 text-center">
                    <PunkButton variant="danger" size="sm" onClick={clearAll}>
                      🗑 전체 삭제 ({items.length})
                    </PunkButton>
                  </div>
                )}
              </div>
            </div>

            {/* 리스트 */}
            <div className="lg:col-span-8">
              {sorted.length === 0 ? (
                <div className="bg-black border-4 border-dashed border-gray-600 p-12 text-center skew-left">
                  <p className="font-anton text-4xl sm:text-5xl uppercase text-gray-500 mb-3">텅 비었음</p>
                  <p className="font-bebas text-xl sm:text-2xl uppercase tracking-widest text-gray-600">
                    왼쪽에서 D-DAY를 추가하라 ⚡
                  </p>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                  {sorted.map((item) => (
                    <DdayCard key={item.id} item={item} nowMs={nowMs} onDelete={deleteItem} />
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* 푸터 */}
          <footer className="mt-16 text-center font-bebas text-lg uppercase tracking-widest text-gray-600">
            <span className="text-[var(--punk-pink)]">★</span> STAY LOUD // 데이터는 브라우저에 저장됨 <span className="text-[var(--punk-green)]">★</span>
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
