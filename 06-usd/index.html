<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원-달러 환율 변환기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes spin-swap { from { transform: rotate(0deg); } to { transform: rotate(180deg); } }
    .animate-swap { animation: spin-swap 0.35s ease; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo, useCallback, useRef } = React;

    // ========================================
    // 🛠️ Utilities
    // ========================================
    // 숫자 → 천 단위 콤마 문자열. KRW는 정수, USD는 소수점 2자리.
    function formatNumber(value, decimals) {
      if (value === '' || value === null || value === undefined || isNaN(value)) return '';
      const num = Number(value);
      return num.toLocaleString('ko-KR', {
        minimumFractionDigits: 0,
        maximumFractionDigits: decimals,
      });
    }

    // 입력 문자열에서 콤마/공백 제거 후 숫자 검증
    function parseInput(raw) {
      if (raw == null) return { ok: false, error: null, value: 0, empty: true };
      const cleaned = String(raw).replace(/,/g, '').trim();
      if (cleaned === '') return { ok: false, error: null, value: 0, empty: true };
      // 숫자(소수점 포함)만 허용
      if (!/^\d*\.?\d*$/.test(cleaned)) {
        return { ok: false, error: '숫자만 입력해 주세요.', value: 0, empty: false };
      }
      const num = Number(cleaned);
      if (isNaN(num)) {
        return { ok: false, error: '올바른 숫자가 아닙니다.', value: 0, empty: false };
      }
      if (num < 0) {
        return { ok: false, error: '음수는 입력할 수 없습니다.', value: 0, empty: false };
      }
      return { ok: true, error: null, value: num, empty: false };
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function MoneyInput({ label, currencyCode, currencySymbol, value, onChange, error, autoFocus }) {
      return (
        <div className="w-full">
          <label className="block text-sm font-medium text-slate-600 mb-2">{label}</label>
          <div className={`flex items-center rounded-xl border-2 px-4 py-3 transition-colors bg-slate-50
            ${error ? 'border-red-400 focus-within:border-red-500' : 'border-slate-200 focus-within:border-indigo-500'}`}>
            <span className="text-slate-500 font-semibold mr-2 select-none">{currencySymbol}</span>
            <input
              type="text"
              inputMode="decimal"
              autoFocus={autoFocus}
              className="flex-1 bg-transparent outline-none text-lg sm:text-xl font-semibold text-slate-800 placeholder-slate-300 min-w-0"
              placeholder="0"
              value={value}
              onChange={(e) => onChange(e.target.value)}
              aria-label={label}
              aria-invalid={!!error}
            />
            <span className="text-slate-400 font-medium ml-2 select-none">{currencyCode}</span>
          </div>
          {error && (
            <p className="mt-1.5 text-sm text-red-500" role="alert">{error}</p>
          )}
        </div>
      );
    }

    function SwapButton({ onClick, spinning }) {
      return (
        <div className="flex justify-center -my-2 relative z-10">
          <button
            onClick={onClick}
            aria-label="통화 방향 전환"
            title="방향 전환"
            className={`w-12 h-12 rounded-full bg-indigo-600 hover:bg-indigo-700 active:scale-95
              text-white shadow-lg flex items-center justify-center transition-all
              ${spinning ? 'animate-swap' : ''}`}
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
            </svg>
          </button>
        </div>
      );
    }

    // ========================================
    // 📄 Converter Page
    // ========================================
    function Converter() {
      // 환율: 1 USD = rate KRW
      const [rateInput, setRateInput] = useState('1,380');
      // 어느 쪽을 입력했는지: 'from' 기준으로 반대편 자동 계산
      // direction: USD가 위(from)에 오면 'USD_TO_KRW', 반대면 'KRW_TO_USD'
      const [direction, setDirection] = useState('USD_TO_KRW');
      const [fromInput, setFromInput] = useState('');
      const [spinning, setSpinning] = useState(false);
      const swapTimer = useRef(null);

      // 환율 파싱
      const rateParsed = useMemo(() => parseInput(rateInput), [rateInput]);
      const rateValid = rateParsed.ok && rateParsed.value > 0;

      // 위/아래 통화 정보
      const top = direction === 'USD_TO_KRW'
        ? { code: 'USD', symbol: '$', label: '미국 달러', decimals: 2 }
        : { code: 'KRW', symbol: '₩', label: '대한민국 원', decimals: 0 };
      const bottom = direction === 'USD_TO_KRW'
        ? { code: 'KRW', symbol: '₩', label: '대한민국 원', decimals: 0 }
        : { code: 'USD', symbol: '$', label: '미국 달러', decimals: 2 };

      // 입력값 파싱
      const fromParsed = useMemo(() => parseInput(fromInput), [fromInput]);

      // 변환 결과 계산
      const resultText = useMemo(() => {
        if (fromParsed.empty) return '';
        if (!fromParsed.ok) return '';
        if (!rateValid) return '';
        let result;
        if (direction === 'USD_TO_KRW') {
          result = fromParsed.value * rateParsed.value; // USD * rate = KRW
        } else {
          result = fromParsed.value / rateParsed.value; // KRW / rate = USD
        }
        return formatNumber(result, bottom.decimals);
      }, [fromParsed, rateValid, rateParsed.value, direction, bottom.decimals]);

      // 입력 에러 메시지
      const fromError = fromParsed.empty ? null : fromParsed.error;
      const rateError = rateParsed.empty
        ? '환율을 입력해 주세요.'
        : (rateParsed.ok && rateParsed.value <= 0 ? '환율은 0보다 커야 합니다.' : rateParsed.error);

      // 방향 전환
      const handleSwap = useCallback(() => {
        setSpinning(true);
        if (swapTimer.current) clearTimeout(swapTimer.current);
        swapTimer.current = setTimeout(() => setSpinning(false), 350);
        // 현재 결과를 새 입력값으로 이어받아 자연스럽게 전환
        setDirection((prev) => prev === 'USD_TO_KRW' ? 'KRW_TO_USD' : 'USD_TO_KRW');
        if (resultText) {
          setFromInput(resultText);
        }
      }, [resultText]);

      // 입력 변경 시 콤마 자동 표시 (소수점 입력 중 보존)
      const handleFromChange = useCallback((raw) => {
        const cleaned = String(raw).replace(/,/g, '');
        if (cleaned === '' || /^\d*\.?\d*$/.test(cleaned)) {
          // 소수점 입력 중이거나 끝자리 0이면 원본 유지, 아니면 콤마 포맷
          if (cleaned === '' || cleaned.endsWith('.') || /\.\d*0$/.test(cleaned)) {
            setFromInput(cleaned);
          } else {
            const num = Number(cleaned);
            const decimals = top.code === 'USD' ? 2 : 0;
            setFromInput(formatNumber(num, decimals));
          }
        } else {
          // 잘못된 문자도 일단 반영하여 에러 표시
          setFromInput(raw);
        }
      }, [top.code]);

      const handleRateChange = useCallback((raw) => {
        const cleaned = String(raw).replace(/,/g, '');
        if (cleaned === '' || cleaned.endsWith('.') || /\.\d*0$/.test(cleaned)) {
          setRateInput(cleaned);
        } else if (/^\d*\.?\d*$/.test(cleaned)) {
          setRateInput(formatNumber(Number(cleaned), 2));
        } else {
          setRateInput(raw);
        }
      }, []);

      return (
        <div className="min-h-screen flex flex-col items-center justify-center px-4 py-10">
          <div className="w-full max-w-md">
            {/* 헤더 */}
            <header className="text-center mb-6">
              <h1 className="text-2xl sm:text-3xl font-bold text-slate-800">원 ↔ 달러 환율 변환기</h1>
              <p className="text-slate-500 mt-1 text-sm">금액을 입력하면 자동으로 환산됩니다</p>
            </header>

            <Card>
              {/* 환율 입력 */}
              <div className="mb-6">
                <MoneyInput
                  label="적용 환율 (1 USD 당 KRW)"
                  currencyCode="KRW"
                  currencySymbol="₩"
                  value={rateInput}
                  onChange={handleRateChange}
                  error={rateError}
                />
              </div>

              <hr className="border-slate-100 mb-6" />

              {/* From 입력 */}
              <MoneyInput
                label={`입력 (${top.label})`}
                currencyCode={top.code}
                currencySymbol={top.symbol}
                value={fromInput}
                onChange={handleFromChange}
                error={fromError}
                autoFocus
              />

              {/* 스왑 버튼 */}
              <SwapButton onClick={handleSwap} spinning={spinning} />

              {/* To 결과 (읽기 전용) */}
              <div className="w-full">
                <label className="block text-sm font-medium text-slate-600 mb-2">
                  결과 ({bottom.label})
                </label>
                <div className="flex items-center rounded-xl border-2 border-indigo-100 bg-indigo-50/60 px-4 py-3">
                  <span className="text-indigo-400 font-semibold mr-2 select-none">{bottom.symbol}</span>
                  <span className="flex-1 text-lg sm:text-xl font-bold text-indigo-700 truncate">
                    {resultText || <span className="text-slate-300 font-semibold">0</span>}
                  </span>
                  <span className="text-indigo-300 font-medium ml-2 select-none">{bottom.code}</span>
                </div>
              </div>

              {/* 환율 요약 */}
              {rateValid && (
                <p className="text-center text-xs text-slate-400 mt-5">
                  현재 적용 환율: 1 USD = {formatNumber(rateParsed.value, 2)} KRW
                </p>
              )}
            </Card>

            <p className="text-center text-xs text-slate-400 mt-4">
              환율은 직접 입력하는 값이며 실시간 시세와 다를 수 있습니다.
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return <Converter />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
