<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>suyong 소개봇</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    @keyframes popIn {
      0% { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .pop-in { animation: popIn 0.2s ease-out; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }
    .dot { animation: blink 1.2s infinite both; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 999px; }
  </style>
</head>
<body style="background:#b2c7d9;">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const API_BASE_URL = '/api';
    const KAKAO_YELLOW = '#FEE500';
    const BG = '#b2c7d9';

    const EXAMPLES = [
      "이 사람 무슨 일 해?",
      "취미가 뭐야?",
      "어떤 걸 만들었어?",
      "나이가 어떻게 돼?",
    ];

    function nowTime() {
      const d = new Date();
      let h = d.getHours();
      const m = String(d.getMinutes()).padStart(2, "0");
      const ampm = h < 12 ? "오전" : "오후";
      h = h % 12; if (h === 0) h = 12;
      return `${ampm} ${h}:${m}`;
    }

    // 봇 답변 글자 단위 타이핑 애니메이션
    function useTypewriter(fullText, active, speed = 16) {
      const [shown, setShown] = useState(active ? "" : fullText);
      useEffect(() => {
        if (!active) { setShown(fullText); return; }
        setShown("");
        let i = 0;
        const id = setInterval(() => {
          i++;
          setShown(fullText.slice(0, i));
          if (i >= fullText.length) clearInterval(id);
        }, speed);
        return () => clearInterval(id);
      }, [fullText, active]);
      return shown;
    }

    // 봇(상대방) 메시지 — 왼쪽, 흰 말풍선 + 프로필
    function BotRow({ text, isError, animate, time }) {
      const shown = useTypewriter(text, animate);
      return (
        <div className="flex items-start gap-2 pop-in mb-3">
          <div className="shrink-0 w-10 h-10 rounded-2xl bg-white flex items-center justify-center text-xl shadow-sm">🙋</div>
          <div className="max-w-[72%]">
            <div className="text-xs text-[#3b4a59] mb-1 ml-1">suyong 소개봇</div>
            <div className="flex items-end gap-1.5">
              <div className={
                "px-3.5 py-2.5 rounded-2xl rounded-tl-md leading-relaxed whitespace-pre-wrap text-[15px] " +
                (isError ? "bg-white text-red-500" : "bg-white text-[#1f1f1f]")
              } style={{ boxShadow: "0 1px 1px rgba(0,0,0,0.06)" }}>
                {isError ? "⚠️ " : ""}{shown}
                {animate && shown.length < text.length ? <span className="text-gray-400">▌</span> : null}
              </div>
              <span className="text-[11px] text-[#5a6b7b] mb-0.5 shrink-0">{time}</span>
            </div>
          </div>
        </div>
      );
    }

    // 내 메시지 — 오른쪽, 카카오 노란 말풍선
    function MeRow({ text, time }) {
      return (
        <div className="flex justify-end items-end gap-1.5 pop-in mb-3">
          <span className="text-[11px] text-[#5a6b7b] mb-0.5 shrink-0">{time}</span>
          <div className="max-w-[72%] px-3.5 py-2.5 rounded-2xl rounded-tr-md leading-relaxed whitespace-pre-wrap text-[15px] text-[#1f1f1f]"
            style={{ background: KAKAO_YELLOW, boxShadow: "0 1px 1px rgba(0,0,0,0.06)" }}>
            {text}
          </div>
        </div>
      );
    }

    function TypingRow() {
      return (
        <div className="flex items-start gap-2 pop-in mb-3">
          <div className="shrink-0 w-10 h-10 rounded-2xl bg-white flex items-center justify-center text-xl shadow-sm">🙋</div>
          <div className="px-4 py-3.5 rounded-2xl rounded-tl-md bg-white flex gap-1.5" style={{ boxShadow: "0 1px 1px rgba(0,0,0,0.06)" }}>
            <span className="dot w-2 h-2 rounded-full bg-gray-400"></span>
            <span className="dot w-2 h-2 rounded-full bg-gray-400"></span>
            <span className="dot w-2 h-2 rounded-full bg-gray-400"></span>
          </div>
        </div>
      );
    }

    function App() {
      const [messages, setMessages] = useState([]); // {role, text, isError?, animate?, time}
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const composing = useRef(false);
      const scrollRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages, loading]);

      const send = useCallback(async (q) => {
        const question = (q ?? input).trim();
        if (!question || loading) return;
        setInput("");
        setMessages((m) => [...m, { role: "me", text: question, time: nowTime() }]);
        setLoading(true);
        try {
          const res = await fetch(`${API_BASE_URL}/ask`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || data.error) {
            setMessages((m) => [...m, { role: "bot", text: data.error || "답변을 받지 못했어요.", isError: true, time: nowTime() }]);
          } else {
            setMessages((m) => [...m, { role: "bot", text: data.answer || "답변이 비어 있어요.", animate: true, time: nowTime() }]);
          }
        } catch (e) {
          setMessages((m) => [...m, { role: "bot", text: "서버에 연결하지 못했어요. 서버가 켜져 있는지 확인해 주세요.", isError: true, time: nowTime() }]);
        } finally {
          setLoading(false);
        }
      }, [input, loading]);

      const onKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey && !composing.current) {
          e.preventDefault();
          send();
        }
      };

      return (
        <div className="h-screen flex flex-col max-w-xl mx-auto" style={{ background: BG }}>

          {/* 상단 헤더 (카카오 채팅방 바) */}
          <header className="flex items-center gap-2 px-3 py-3 bg-[#a3bace] text-[#1f2d3a] shadow-sm">
            <span className="text-xl">‹</span>
            <div className="w-8 h-8 rounded-xl bg-white flex items-center justify-center text-base">🙋</div>
            <div className="flex-1">
              <div className="font-bold text-[15px] leading-tight">suyong 소개봇</div>
              <div className="text-[11px] text-[#3b4a59]">나에_대한_추측.md 기반 · 문서에 없으면 "몰라요"</div>
            </div>
            <span className="text-lg">≡</span>
          </header>

          {/* 채팅 영역 */}
          <div ref={scrollRef} className="chat-scroll flex-1 overflow-y-auto px-3 py-4">

            {/* 날짜/안내 구분선 (카카오 스타일) */}
            <div className="flex justify-center mb-4">
              <span className="text-[12px] text-white bg-[#7e93a6] rounded-full px-3 py-1">📄 suyong의 나에_대한_추측.md를 근거로 답해요</span>
            </div>

            {messages.length === 0 && (
              <BotRow
                text={"안녕하세요! 저는 suyong의 소개 문서를 근거로 답하는 봇이에요.\n문서에 있는 내용만 답하고, 없는 건 \"몰라요\"라고 답해요.\n아래 질문을 눌러보거나 직접 물어보세요 👇"}
                time={nowTime()}
              />
            )}

            {messages.length === 0 && (
              <div className="flex flex-wrap gap-2 ml-12 mb-2">
                {EXAMPLES.map((q) => (
                  <button key={q} onClick={() => send(q)}
                    className="text-[13px] px-3 py-2 rounded-full bg-white text-[#3b4a59] border border-white/60 shadow-sm hover:bg-gray-50 transition">
                    {q}
                  </button>
                ))}
              </div>
            )}

            {messages.map((m, i) =>
              m.role === "me"
                ? <MeRow key={i} text={m.text} time={m.time} />
                : <BotRow key={i} text={m.text} isError={m.isError} animate={m.animate} time={m.time} />
            )}

            {loading && <TypingRow />}
          </div>

          {/* 입력창 (카카오 하단 바) */}
          <div className="flex items-end gap-2 px-3 py-2.5 bg-white">
            <textarea
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={onKeyDown}
              onCompositionStart={() => (composing.current = true)}
              onCompositionEnd={() => (composing.current = false)}
              rows={1}
              disabled={loading}
              placeholder={loading ? "생각 중…" : "메시지를 입력하세요"}
              className="flex-1 resize-none outline-none bg-[#f1f1f1] rounded-2xl px-4 py-2.5 text-[15px] text-[#1f1f1f] max-h-28 disabled:opacity-50"
            />
            <button
              onClick={() => send()}
              disabled={loading || !input.trim()}
              className="shrink-0 px-4 py-2.5 rounded-2xl font-bold text-[#3a1d1d] disabled:opacity-40 transition"
              style={{ background: KAKAO_YELLOW }}>
              전송
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
