<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나만의 이미지 생성기 · AI IMAGE STUDIO</title>

  <!-- ===== CDN: Tailwind / React / Babel ===== -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Tailwind으로 표현하기 어려운 부분만 커스텀 CSS로 작성 */
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Pretendard", "Malgun Gothic", sans-serif;
    }
    body { margin: 0; }

    /* 배경 그라데이션 (보라/블루 다크 테마) + 은은한 빛번짐 */
    .studio-bg {
      background:
        radial-gradient(1100px 600px at 12% -8%, rgba(139, 92, 246, 0.28), transparent 60%),
        radial-gradient(900px 600px at 92% 8%, rgba(56, 189, 248, 0.22), transparent 55%),
        linear-gradient(180deg, #0b0b18 0%, #0a0a14 55%, #07070f 100%);
    }

    /* 결과 영역 스켈레톤 로딩 애니메이션 */
    @keyframes shimmer { 0% { background-position: -700px 0; } 100% { background-position: 700px 0; } }
    .skeleton {
      background: linear-gradient(100deg, rgba(255,255,255,0.04) 30%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.04) 70%);
      background-size: 1400px 100%;
      animation: shimmer 1.6s infinite linear;
    }

    /* 생성 결과 이미지 fade-in */
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    .fade-in { animation: fadeInScale 0.5s ease-out; }

    /* 커스텀 스크롤바 */
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.4); border-radius: 9px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="studio-bg text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 추출
    // ========================================
    const { useState, useMemo, useCallback, useRef } = React;

    // ========================================
    // 스타일 프리셋 정의
    //  - label: 화면에 보일 한글 이름
    //  - keywords: 최종 프롬프트에 더해질 영어 스타일 키워드 (영어가 화질이 좋음)
    //  - emoji / accent: 카드 시각 표현용
    //  핵심 원리 → "사용자 프롬프트" + "스타일 키워드" 를 조합해 최종 프롬프트를 만든다.
    // ========================================
    const STYLE_PRESETS = [
      {
        id: "photo", label: "사진 실사", emoji: "📷",
        desc: "DSLR 느낌의 사실적인 사진",
        keywords: "photorealistic, ultra realistic photo, 8k, sharp focus, natural lighting, DSLR",
        accent: "from-sky-500 to-blue-600",
      },
      {
        id: "anime", label: "애니메이션 / 지브리풍", emoji: "🌸",
        desc: "부드러운 셀 애니메이션 화풍",
        keywords: "anime style, studio ghibli inspired, cel shading, soft colors, hand drawn, beautiful background",
        accent: "from-pink-500 to-rose-500",
      },
      {
        id: "oil", label: "유화", emoji: "🖼️",
        desc: "두꺼운 붓터치의 클래식 유화",
        keywords: "oil painting, thick brush strokes, classical art, textured canvas, fine art masterpiece",
        accent: "from-amber-500 to-orange-600",
      },
      {
        id: "watercolor", label: "수채화", emoji: "🎨",
        desc: "맑고 번지는 수채 일러스트",
        keywords: "watercolor painting, soft washes, bleeding colors, paper texture, delicate, light and airy",
        accent: "from-teal-400 to-cyan-500",
      },
      {
        id: "cyberpunk", label: "사이버펑크", emoji: "🌃",
        desc: "네온 가득한 미래 도시 분위기",
        keywords: "cyberpunk style, neon lights, futuristic, glowing, rain, blade runner aesthetic, high detail",
        accent: "from-fuchsia-500 to-purple-600",
      },
      {
        id: "pixel", label: "픽셀아트", emoji: "👾",
        desc: "레트로 게임 도트 그래픽",
        keywords: "pixel art, 16-bit, retro game style, pixelated, vibrant palette, isometric",
        accent: "from-lime-400 to-emerald-500",
      },
      {
        id: "render3d", label: "3D 렌더", emoji: "🧊",
        desc: "매끈한 3D CG 렌더링",
        keywords: "3d render, octane render, cinema4d, soft global illumination, smooth materials, high quality cgi",
        accent: "from-indigo-500 to-violet-600",
      },
      {
        id: "lineart", label: "미니멀 라인아트", emoji: "✏️",
        desc: "깔끔한 선 위주의 미니멀 일러스트",
        keywords: "minimal line art, clean vector lines, simple, flat design, limited color palette, elegant",
        accent: "from-slate-400 to-slate-600",
      },
    ];

    // 이미지 API 베이스 (Pollinations.ai — API 키 불필요)
    const POLLINATIONS_BASE = "https://image.pollinations.ai/prompt/";

    // ========================================
    // 🎨 Design System Components (순수 표현용)
    // ========================================
    function Badge({ children }) {
      return (
        <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-semibold tracking-[0.18em] uppercase
          bg-white/5 border border-white/10 text-violet-200 backdrop-blur">
          <span className="w-1.5 h-1.5 rounded-full bg-violet-400 animate-pulse"></span>
          {children}
        </span>
      );
    }

    function Card({ children, className = "" }) {
      return (
        <div className={"rounded-2xl border border-white/10 bg-white/[0.03] backdrop-blur-xl shadow-2xl shadow-black/40 " + className}>
          {children}
        </div>
      );
    }

    function Button({ children, variant = "primary", size = "md", disabled = false, onClick, className = "", title }) {
      const base = "inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 select-none " +
        "focus:outline-none focus:ring-2 focus:ring-violet-400/50 disabled:opacity-40 disabled:cursor-not-allowed";
      const sizes = { sm: "px-3 py-1.5 text-sm", md: "px-5 py-2.5 text-sm", lg: "px-7 py-3.5 text-base" };
      const variants = {
        primary: "text-white bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 " +
          "shadow-lg shadow-violet-900/40 active:scale-[0.98]",
        secondary: "text-slate-100 bg-white/8 hover:bg-white/15 border border-white/10 active:scale-[0.98]",
        ghost: "text-slate-300 hover:text-white hover:bg-white/8",
      };
      return (
        <button type="button" title={title} disabled={disabled} onClick={onClick}
          className={[base, sizes[size], variants[variant], className].join(" ")}>
          {children}
        </button>
      );
    }

    // 스타일 선택 카드 (선택 시 강조)
    function StyleCard({ preset, selected, onSelect }) {
      return (
        <button
          type="button"
          onClick={() => onSelect(preset.id)}
          aria-pressed={selected}
          className={[
            "group relative text-left rounded-2xl p-4 border transition-all duration-200 overflow-hidden",
            "focus:outline-none focus:ring-2 focus:ring-violet-400/60",
            selected
              ? "border-violet-400/80 bg-white/[0.08] shadow-lg shadow-violet-900/40 scale-[1.02]"
              : "border-white/10 bg-white/[0.02] hover:bg-white/[0.05] hover:border-white/25",
          ].join(" ")}
        >
          {/* 선택 시 윗부분 그라데이션 바 강조 */}
          <span className={"absolute inset-x-0 top-0 h-1 bg-gradient-to-r " + preset.accent +
            (selected ? " opacity-100" : " opacity-0 group-hover:opacity-60") + " transition-opacity"} />
          <div className="flex items-start justify-between">
            <span className="text-2xl">{preset.emoji}</span>
            {selected && (
              <span className="text-violet-300 text-xs font-bold flex items-center gap-1">
                <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M16.7 5.3a1 1 0 010 1.4l-7.5 7.5a1 1 0 01-1.4 0L3.3 9.7a1 1 0 011.4-1.4l3.1 3.1 6.8-6.8a1 1 0 011.4 0z" clipRule="evenodd"/>
                </svg>
                선택됨
              </span>
            )}
          </div>
          <div className="mt-2 font-bold text-[15px] text-slate-50">{preset.label}</div>
          <div className="mt-0.5 text-xs text-slate-400 leading-snug">{preset.desc}</div>
        </button>
      );
    }

    // ========================================
    // 🧩 Layout: Header
    // ========================================
    function Header() {
      return (
        <header className="text-center pt-12 pb-8 px-4">
          <Badge>AI IMAGE STUDIO</Badge>
          <h1 className="mt-5 text-4xl sm:text-6xl font-black tracking-tight
            bg-gradient-to-r from-violet-300 via-fuchsia-300 to-sky-300 bg-clip-text text-transparent">
            나만의 이미지 생성기
          </h1>
          <p className="mt-4 text-sm sm:text-base text-slate-400 max-w-xl mx-auto leading-relaxed">
            화풍을 고르고 떠오르는 장면을 한 줄로 적으면, AI가 그림으로 만들어 드려요.
            <br className="hidden sm:block" />
            <span className="text-slate-500">Powered by Pollinations.ai · API 키 불필요</span>
          </p>
        </header>
      );
    }

    // ========================================
    // 📄 Page: 이미지 생성기 본체
    // ========================================
    function ImageGenerator() {
      const [selectedStyle, setSelectedStyle] = useState("photo"); // 선택된 스타일 id
      const [prompt, setPrompt] = useState("");                    // 사용자 입력 프롬프트
      const [seed, setSeed] = useState(() => Math.floor(Math.random() * 1_000_000)); // 랜덤 seed

      // 생성 요청 시점에 "확정된" 값들 (입력칸을 수정해도 현재 이미지가 바뀌지 않도록 분리)
      const [submitted, setSubmitted] = useState(null); // { prompt, styleId } | null
      const [status, setStatus] = useState("idle");     // idle | loading | done | error

      const preset = useMemo(
        () => STYLE_PRESETS.find((s) => s.id === selectedStyle) || STYLE_PRESETS[0],
        [selectedStyle]
      );

      // ----- 핵심 1: 프롬프트 조합 -----
      // 최종 프롬프트 = 사용자 프롬프트 + ", " + 선택한 스타일의 영어 키워드
      const buildFinalPrompt = useCallback((userText, styleId) => {
        const p = STYLE_PRESETS.find((s) => s.id === styleId) || STYLE_PRESETS[0];
        return `${userText.trim()}, ${p.keywords}`;
      }, []);

      // 화면 표시용: 지금 입력/선택 기준 미리보기 프롬프트
      const previewPrompt = useMemo(
        () => (prompt.trim() ? buildFinalPrompt(prompt, selectedStyle) : ""),
        [prompt, selectedStyle, buildFinalPrompt]
      );

      // ----- 핵심 2: 이미지 URL 생성 -----
      // Pollinations는 URL 자체가 이미지라서, <img src>에 넣기만 하면 브라우저가 받아온다.
      // seed를 바꾸면 같은 프롬프트라도 다른 결과가 나온다.
      const imageUrl = useMemo(() => {
        if (!submitted) return "";
        const finalPrompt = buildFinalPrompt(submitted.prompt, submitted.styleId);
        const encoded = encodeURIComponent(finalPrompt);
        const params = `width=1024&height=1024&nologo=true&seed=${submitted.seed}&model=flux`;
        return `${POLLINATIONS_BASE}${encoded}?${params}`;
      }, [submitted, buildFinalPrompt]);

      const canGenerate = prompt.trim().length > 0;

      // 생성 버튼: 현재 입력값을 확정(submitted)하고 로딩 시작
      const handleGenerate = useCallback(() => {
        if (!canGenerate) return;
        const newSeed = Math.floor(Math.random() * 1_000_000);
        setSeed(newSeed);
        setSubmitted({ prompt: prompt.trim(), styleId: selectedStyle, seed: newSeed });
        setStatus("loading");
      }, [canGenerate, prompt, selectedStyle]);

      // ----- 핵심 3: 다시 생성 -----
      // 프롬프트/스타일은 그대로, seed만 새로 바꿔서 다른 결과를 받는다.
      const handleRegenerate = useCallback(() => {
        if (!submitted) return;
        const newSeed = Math.floor(Math.random() * 1_000_000);
        setSeed(newSeed);
        setSubmitted({ ...submitted, seed: newSeed });
        setStatus("loading");
      }, [submitted]);

      // 다운로드: 이미지를 fetch → blob → a 태그로 저장
      const handleDownload = useCallback(async () => {
        if (!imageUrl) return;
        try {
          const res = await fetch(imageUrl);
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `ai-image-${submitted.styleId}-${submitted.seed}.png`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        } catch (e) {
          // CORS/네트워크 실패 시 새 탭으로 폴백
          window.open(imageUrl, "_blank");
        }
      }, [imageUrl, submitted]);

      // Enter 키로도 생성 (Shift+Enter는 줄바꿈)
      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleGenerate();
        }
      };

      return (
        <main className="max-w-5xl mx-auto px-4 sm:px-6 pb-20 space-y-8">

          {/* ① 스타일 선택 그리드 */}
          <section>
            <div className="flex items-center gap-2 mb-4">
              <span className="grid place-items-center w-7 h-7 rounded-lg bg-violet-500/20 text-violet-300 text-sm font-bold">1</span>
              <h2 className="text-lg font-bold text-slate-100">화풍 / 분위기 선택</h2>
              <span className="text-xs text-slate-500">— 카드를 누르면 선택돼요</span>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
              {STYLE_PRESETS.map((p) => (
                <StyleCard key={p.id} preset={p} selected={p.id === selectedStyle} onSelect={setSelectedStyle} />
              ))}
            </div>
          </section>

          {/* ② 프롬프트 입력 */}
          <section>
            <div className="flex items-center gap-2 mb-4">
              <span className="grid place-items-center w-7 h-7 rounded-lg bg-violet-500/20 text-violet-300 text-sm font-bold">2</span>
              <h2 className="text-lg font-bold text-slate-100">무엇을 그릴까요?</h2>
            </div>
            <Card className="p-5">
              <label htmlFor="prompt" className="sr-only">이미지 프롬프트</label>
              <textarea
                id="prompt"
                rows={3}
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="예) 노을 지는 바닷가를 걷는 고양이 / 우주를 나는 고래 / 커피를 마시는 로봇..."
                className="w-full resize-none rounded-xl bg-black/30 border border-white/10 px-4 py-3 text-[15px] text-slate-100
                  placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-violet-400/50 focus:border-violet-400/40"
              />

              <div className="mt-3 flex flex-wrap items-center justify-between gap-3">
                <div className="text-xs text-slate-500">
                  현재 화풍: <span className="text-violet-300 font-semibold">{preset.emoji} {preset.label}</span>
                  <span className="ml-2 text-slate-600">· Enter로 생성</span>
                </div>
                <Button size="lg" onClick={handleGenerate} disabled={!canGenerate}
                  title={canGenerate ? "이미지 생성" : "프롬프트를 입력하세요"}>
                  <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M5 3l1.5 4.5L11 9 6.5 10.5 5 15l-1.5-4.5L-1 9" transform="translate(4 0)"/>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 3v0M19 13l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z"/>
                  </svg>
                  이미지 생성
                </Button>
              </div>

              {/* 입력 비어있을 때 안내 */}
              {!canGenerate && (
                <p className="mt-3 text-xs text-amber-300/80">✦ 그리고 싶은 장면을 한 줄 적으면 버튼이 활성화돼요.</p>
              )}

              {/* 최종 조합 프롬프트 미리보기 (교육용 — 조합 원리 노출) */}
              {previewPrompt && (
                <div className="mt-4 rounded-xl bg-black/40 border border-white/5 p-3">
                  <div className="text-[11px] uppercase tracking-wider text-slate-500 mb-1">
                    AI에게 전달될 최종 프롬프트 (내 입력 + 스타일 키워드)
                  </div>
                  <code className="block text-xs text-emerald-300/90 break-words leading-relaxed">
                    {previewPrompt}
                  </code>
                </div>
              )}
            </Card>
          </section>

          {/* ③ 결과 이미지 영역 */}
          <section>
            <div className="flex items-center gap-2 mb-4">
              <span className="grid place-items-center w-7 h-7 rounded-lg bg-violet-500/20 text-violet-300 text-sm font-bold">3</span>
              <h2 className="text-lg font-bold text-slate-100">생성 결과</h2>
            </div>

            <Card className="p-4 sm:p-6">
              <div className="relative w-full aspect-square max-w-[640px] mx-auto rounded-2xl overflow-hidden bg-black/40 border border-white/10">

                {/* 아직 생성 전: 안내 placeholder */}
                {!submitted && (
                  <div className="absolute inset-0 grid place-items-center text-center px-6">
                    <div>
                      <div className="text-5xl mb-3">🪄</div>
                      <p className="text-slate-400 text-sm">화풍을 고르고 프롬프트를 입력한 뒤<br/>“이미지 생성”을 눌러보세요.</p>
                    </div>
                  </div>
                )}

                {/* 로딩 중: 스켈레톤 + 스피너 */}
                {submitted && status === "loading" && (
                  <div className="absolute inset-0 skeleton grid place-items-center">
                    <div className="flex flex-col items-center gap-3">
                      <div className="w-12 h-12 rounded-full border-4 border-white/15 border-t-violet-400 animate-spin"></div>
                      <p className="text-sm text-slate-300">AI가 그림을 그리고 있어요…</p>
                      <p className="text-xs text-slate-500">flux 모델은 보통 5~15초 정도 걸려요</p>
                    </div>
                  </div>
                )}

                {/* 에러 처리 */}
                {submitted && status === "error" && (
                  <div className="absolute inset-0 grid place-items-center text-center px-6">
                    <div>
                      <div className="text-4xl mb-2">⚠️</div>
                      <p className="text-rose-300 text-sm mb-3">이미지를 불러오지 못했어요.<br/>잠시 후 다시 시도해 주세요.</p>
                      <Button variant="secondary" size="sm" onClick={handleRegenerate}>다시 시도</Button>
                    </div>
                  </div>
                )}

                {/* 이미지: 항상 렌더하되, 로딩 중에는 위 스켈레톤이 덮음.
                    onLoad → 완료, onError → 실패 처리 */}
                {submitted && (
                  <img
                    key={imageUrl}  /* URL 바뀌면 새로 마운트되어 onLoad가 다시 발동 */
                    src={imageUrl}
                    alt={submitted.prompt}
                    onLoad={() => setStatus("done")}
                    onError={() => setStatus("error")}
                    className={"w-full h-full object-cover transition-opacity duration-300 " +
                      (status === "done" ? "opacity-100 fade-in" : "opacity-0")}
                  />
                )}
              </div>

              {/* 결과 하단: 액션 버튼 + 사용된 프롬프트/seed 정보 */}
              {submitted && status === "done" && (
                <div className="mt-5 space-y-4">
                  <div className="flex flex-wrap justify-center gap-3">
                    <Button onClick={handleRegenerate} variant="secondary">
                      <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h5M20 20v-5h-5M5 9a7 7 0 0111-3.5L20 9M19 15a7 7 0 01-11 3.5L4 15"/>
                      </svg>
                      다시 생성
                    </Button>
                    <Button onClick={handleDownload}>
                      <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/>
                      </svg>
                      다운로드
                    </Button>
                  </div>

                  <div className="rounded-xl bg-black/40 border border-white/5 p-3 text-center">
                    <p className="text-xs text-slate-400">
                      <span className="text-slate-500">사용된 화풍</span>{" "}
                      <span className="text-violet-300 font-semibold">
                        {STYLE_PRESETS.find((s) => s.id === submitted.styleId)?.label}
                      </span>
                      <span className="mx-2 text-slate-700">|</span>
                      <span className="text-slate-500">seed</span>{" "}
                      <span className="text-slate-300 font-mono">{submitted.seed}</span>
                    </p>
                  </div>
                </div>
              )}
            </Card>
          </section>
        </main>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return (
        <div className="min-h-screen">
          <Header />
          <ImageGenerator />
          <footer className="text-center pb-10 text-xs text-slate-600">
            하버스쿨 AI 교육 · Network + AI 실습 · 단일 index.html (React + Tailwind via CDN)
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
