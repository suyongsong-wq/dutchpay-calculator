<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나를 설명하는 Q&A 앱</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --tg-header: #527da3;        /* 텔레그램 헤더 블루 */
      --tg-header2: #4a76a8;
      --tg-out: #effdde;           /* 보낸 메시지(연녹색) */
      --tg-out-time: #62b15a;
      --tg-bg: #cfdfec;            /* 채팅 배경(연블루) */
    }
    html, body { height: 100%; margin: 0; }
    body {
      background-color: var(--tg-bg);
      /* 텔레그램풍 도트 패턴 월페이퍼 */
      background-image:
        radial-gradient(rgba(255,255,255,0.45) 1.5px, transparent 1.6px),
        radial-gradient(rgba(83,125,163,0.10) 1.5px, transparent 1.6px);
      background-size: 22px 22px, 22px 22px;
      background-position: 0 0, 11px 11px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Apple SD Gothic Neo", sans-serif;
    }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: rgba(82,125,163,.35); border-radius: 9999px; }
    /* 말풍선 꼬리 */
    .tail-out::after {
      content: ""; position: absolute; right: -6px; bottom: 0;
      width: 0; height: 0; border: 7px solid transparent;
      border-left-color: var(--tg-out); border-bottom: 0; border-right: 0;
    }
    .tail-in::after {
      content: ""; position: absolute; left: -6px; bottom: 0;
      width: 0; height: 0; border: 7px solid transparent;
      border-right-color: #fff; border-bottom: 0; border-left: 0;
    }
    @keyframes blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }
    .dot { animation: blink 1.2s infinite both; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const CHIPS = [
      "무슨 일 해?",
      "어떤 사람이야?",
      "왜 API 키를 서버에 숨겨?",
      "어떤 프로젝트 만들었어?",
    ];

    function nowTime() {
      const d = new Date();
      const h = d.getHours();
      const m = String(d.getMinutes()).padStart(2, "0");
      const ap = h < 12 ? "오전" : "오후";
      const hh = h % 12 === 0 ? 12 : h % 12;
      return `${ap} ${hh}:${m}`;
    }

    function MultilineText({ text }) {
      const parts = text.split("\n");
      return parts.map((line, i) => (
        <React.Fragment key={i}>
          {line}
          {i < parts.length - 1 && <br />}
        </React.Fragment>
      ));
    }

    function Bubble({ role, text, time, error }) {
      const isUser = role === "user";
      if (isUser) {
        return (
          <div className="flex justify-end px-3">
            <div className="tail-out relative max-w-[78%] px-2.5 pt-1.5 pb-1 rounded-xl shadow-sm"
                 style={{ background: "var(--tg-out)" }}>
              <div className="text-[15px] leading-snug text-gray-900 whitespace-pre-wrap break-words">
                <MultilineText text={text} />
              </div>
              <div className="text-[11px] text-right mt-0.5 leading-none" style={{ color: "var(--tg-out-time)" }}>
                {time} ✓✓
              </div>
            </div>
          </div>
        );
      }
      return (
        <div className="flex justify-start px-3">
          <div className={"tail-in relative max-w-[78%] px-2.5 pt-1.5 pb-1 rounded-xl shadow-sm " +
              (error ? "bg-white" : "bg-white")}>
            <div className={"text-[15px] leading-snug whitespace-pre-wrap break-words " +
                (error ? "text-rose-600" : "text-gray-900")}>
              <MultilineText text={text} />
            </div>
            <div className="text-[11px] text-right mt-0.5 leading-none text-gray-400">{time}</div>
          </div>
        </div>
      );
    }

    function Typing() {
      return (
        <div className="flex justify-start px-3">
          <div className="tail-in relative bg-white rounded-xl px-3 py-2.5 shadow-sm">
            <div className="flex items-center gap-1.5">
              <span className="text-[13px] text-gray-400 mr-1">입력 중</span>
              <span className="dot w-1.5 h-1.5 rounded-full inline-block" style={{ background: "var(--tg-header)" }}></span>
              <span className="dot w-1.5 h-1.5 rounded-full inline-block" style={{ background: "var(--tg-header)" }}></span>
              <span className="dot w-1.5 h-1.5 rounded-full inline-block" style={{ background: "var(--tg-header)" }}></span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [messages, setMessages] = useState([
        { role: "bot", text: "안녕하세요! 저(송수용)와 제가 배운 수업 내용에 대해 무엇이든 물어보세요. 😊", time: nowTime() },
      ]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const scrollRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages, loading]);

      async function ask(question) {
        const q = (question || "").trim();
        if (!q || loading) return;

        setMessages((m) => [...m, { role: "user", text: q, time: nowTime() }]);
        setInput("");
        setLoading(true);

        try {
          const res = await fetch("/api/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q }),
          });
          const data = await res.json();
          if (!res.ok || data.error) {
            setMessages((m) => [...m, { role: "bot", error: true, text: data.error || "답변을 받지 못했어요.", time: nowTime() }]);
          } else {
            setMessages((m) => [...m, { role: "bot", text: data.answer || "답을 만들지 못했어요.", time: nowTime() }]);
          }
        } catch (e) {
          setMessages((m) => [...m, { role: "bot", error: true, text: "네트워크 오류로 서버에 연결하지 못했어요.", time: nowTime() }]);
        } finally {
          setLoading(false);
        }
      }

      function onKeyDown(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          ask(input);
        }
      }

      return (
        <div className="h-screen flex flex-col max-w-2xl mx-auto shadow-2xl bg-transparent">
          {/* 헤더 바 (텔레그램 블루) */}
          <header className="flex items-center gap-3 px-4 py-2.5 text-white shadow-md z-10"
                  style={{ background: "linear-gradient(180deg, var(--tg-header), var(--tg-header2))" }}>
            <div className="w-10 h-10 rounded-full bg-white/25 flex items-center justify-center text-lg font-bold">나</div>
            <div className="leading-tight">
              <div className="font-semibold text-[16px]">나를 설명하는 Q&amp;A</div>
              <div className="text-[12px] text-white/80">about-me.md 근거로만 답해요 · 없으면 '몰라요'</div>
            </div>
            <div className="ml-auto flex items-center gap-1 text-[12px] text-white/85">
              <span className="w-2 h-2 rounded-full bg-green-300 inline-block"></span> 온라인
            </div>
          </header>

          {/* 메시지 영역 */}
          <div ref={scrollRef} className="chat-scroll flex-1 overflow-y-auto py-3 space-y-2">
            {messages.map((m, i) => (
              <Bubble key={i} role={m.role} text={m.text} time={m.time} error={m.error} />
            ))}
            {loading && <Typing />}
          </div>

          {/* 예시 질문 칩 */}
          <div className="px-3 pb-1 flex flex-wrap gap-2">
            {CHIPS.map((c) => (
              <button
                key={c}
                onClick={() => ask(c)}
                disabled={loading}
                className="text-[13px] px-3 py-1.5 rounded-full bg-white/85 hover:bg-white text-[#34699a] border border-white shadow-sm transition disabled:opacity-40 disabled:cursor-not-allowed"
              >
                {c}
              </button>
            ))}
          </div>

          {/* 입력 바 */}
          <div className="px-2 py-2 flex items-end gap-2 bg-white/70 backdrop-blur">
            <div className="flex-1 flex items-end bg-white rounded-3xl border border-gray-200 px-4 py-1.5 shadow-sm">
              <textarea
                rows={1}
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={onKeyDown}
                placeholder="메시지를 입력하세요…"
                className="flex-1 resize-none outline-none text-[15px] text-gray-800 bg-transparent max-h-32 py-1"
              />
            </div>
            <button
              onClick={() => ask(input)}
              disabled={loading || !input.trim()}
              aria-label="보내기"
              className="shrink-0 w-11 h-11 rounded-full flex items-center justify-center text-white shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed"
              style={{ background: "var(--tg-header)" }}
            >
              {/* 종이비행기 아이콘 */}
              <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
