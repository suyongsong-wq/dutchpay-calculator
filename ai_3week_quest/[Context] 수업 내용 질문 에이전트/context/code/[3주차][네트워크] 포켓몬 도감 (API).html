<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포켓컴 — API 포켓몬 도감</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Malgun Gothic", "맑은 고딕", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, #3b4252 0, transparent 55%),
        radial-gradient(circle at 90% 90%, #2a2f3a 0, transparent 55%),
        #1b1e26;
    }
    /* 도트(디지털) 폰트 느낌 */
    .lcd-font { font-family: "DM Mono","Courier New",monospace; letter-spacing: 0.04em; }

    /* ── 포켓컴 본체 ── */
    .dex-shell {
      background: linear-gradient(150deg, #ef3d3d 0%, #d62828 55%, #b01e1e 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.35),
        inset 0 -8px 24px rgba(0,0,0,.30),
        0 28px 60px rgba(0,0,0,.55),
        0 6px 14px rgba(0,0,0,.4);
    }
    /* 좌/우 패널 사이 경첩 */
    .hinge {
      background: repeating-linear-gradient(
        to bottom, #b01e1e 0 8px, #8f1818 8px 16px);
      box-shadow: inset 0 0 4px rgba(0,0,0,.5);
    }
    /* 큰 파란 렌즈 (좌측 상단 보석) */
    .big-lens {
      background:
        radial-gradient(circle at 35% 30%, #eaf6ff 0 6%, #7fd2ff 22%, #2196f3 55%, #0b5ec9 100%);
      box-shadow:
        0 0 0 6px #fff,
        0 0 0 9px rgba(0,0,0,.25),
        inset 0 4px 10px rgba(255,255,255,.6),
        inset 0 -6px 12px rgba(0,0,0,.35);
    }
    .big-lens::after {
      content:"";
      position:absolute; top:14%; left:20%;
      width:34%; height:24%;
      background: rgba(255,255,255,.85);
      border-radius:50%;
      filter: blur(2px);
    }
    .led { box-shadow: 0 0 6px 1px currentColor, inset 0 -2px 3px rgba(0,0,0,.35), inset 0 2px 3px rgba(255,255,255,.7); }
    .blink { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity:.35; } }

    /* ── 초록 LCD 스크린 ── */
    .screen-bezel {
      background: linear-gradient(160deg,#e7e7e7,#bdbdbd);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.7), inset 0 -3px 6px rgba(0,0,0,.3);
    }
    .screen {
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 2px, transparent 2px 4px),
        linear-gradient(160deg,#9bbc0f 0%, #8bac0f 50%, #6f8f0a 100%);
      box-shadow: inset 0 0 22px rgba(0,40,0,.5), inset 0 0 6px rgba(0,0,0,.4);
      color:#143601;
    }
    .screen-glare {
      background: linear-gradient(120deg, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 38%);
    }

    /* 작은 도트행/버튼 디테일 */
    .speaker-line { background: #9a1a1a; box-shadow: inset 0 1px 1px rgba(0,0,0,.4); }
    .dpad { background: linear-gradient(160deg,#3a3f47,#23262c); box-shadow: inset 0 1px 0 rgba(255,255,255,.15), 0 3px 6px rgba(0,0,0,.5); }
    .round-btn { box-shadow: inset 0 2px 2px rgba(255,255,255,.5), inset 0 -3px 4px rgba(0,0,0,.35), 0 3px 5px rgba(0,0,0,.4); }
    .key-btn { box-shadow: inset 0 1px 0 rgba(255,255,255,.5), inset 0 -2px 3px rgba(0,0,0,.3), 0 2px 4px rgba(0,0,0,.4); }
    .key-btn:active { transform: translateY(1px); }

    /* 애니메이션 */
    @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .animate-floaty { animation: floaty 3s ease-in-out infinite; }
    @keyframes spin360 { to { transform: rotate(360deg); } }
    .animate-spin360 { animation: spin360 .9s linear infinite; }
    @keyframes growBar { from { width:0; } }
    .animate-grow-bar { animation: growBar .7s cubic-bezier(.22,1,.36,1) both; }
    @keyframes popIn { from{opacity:0; transform:scale(.9)} to{opacity:1; transform:scale(1)} }
    .animate-pop { animation: popIn .35s ease-out both; }
    @keyframes scanline { from{transform:translateY(-100%)} to{transform:translateY(100%)} }
    .scan { animation: scanline 2.4s linear infinite; }
  </style>
</head>

              return (
                <div className="animate-pop flex h-full flex-col">
                  <div className="flex items-center justify-between px-2 pt-1.5">
                    <span className="lcd-font text-[11px] font-bold">No.{String(data.id).padStart(3,"0")}</span>
                    <span className="lcd-font text-[11px] font-bold">{data.korName || data.name}</span>
                  </div>
                  <div className="flex flex-1 items-center justify-center">
                    {img
                      ? <img src={img} alt={data.name} className="h-[78%] w-[78%] animate-floaty object-contain"
                          style={{ filter:"drop-shadow(0 6px 6px rgba(0,40,0,.45))" }} />
                      : <span className="lcd-font text-xs">NO IMAGE</span>}
                  </div>
                  <div className="flex items-center justify-center gap-1.5 pb-1.5">
                    {data.types.map(t => <TypeBadge key={t.type.name} type={t.type.name} />)}
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      );
    }

    /* 우측 데이터 스크린 — 텍스트/능력치 */
    function DataScreen({ status, data }) {
      return (
        <div className="screen-bezel rounded-md p-2">
          <div className="screen relative min-h-[150px] overflow-hidden rounded-sm px-2.5 py-2">
            <div className="screen-glare pointer-events-none absolute inset-0" />
            {status === "done" && data ? (
              <div className="animate-pop relative space-y-2">
                <div className="lcd-font grid grid-cols-2 gap-x-3 gap-y-0.5 text-[11px] font-bold">
                  <div>키 : {(data.height/10).toFixed(1)}m</div>
                  <div>무게 : {(data.weight/10).toFixed(1)}kg</div>
                </div>
                <div className="my-1 border-t border-[#143601]/30" />
                <div className="space-y-1">
                  {data.stats.map(s => <StatBar key={s.stat.name} name={s.stat.name} value={s.base_stat} />)}
                </div>
                <div className="lcd-font pt-0.5 text-right text-[10px] font-bold opacity-80">
                  TOTAL {data.stats.reduce((a,b)=>a+b.base_stat,0)}
                </div>
              </div>
            ) : (
              <div className="lcd-font flex h-[134px] items-center justify-center text-[11px] font-bold text-[#143601]/60">
                {status === "loading" ? "LOADING DATA..." : "데이터 대기 중"}
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [query, setQuery] = useState("");
      const [data, setData] = useState(null);
      const [status, setStatus] = useState("idle");
      const [errorMsg, setErrorMsg] = useState("");
      const inputRef = useRef(null);

      useEffect(() => { inputRef.current?.focus(); }, []);

      async function search(raw) {
        const trimmed = String(raw).trim();
        if (!trimmed) return;
        // 한글 이름이면 도감 번호로 변환 (PokeAPI는 한글 검색어를 못 받음)
        const korId = KOR_TO_ID[trimmed];
        const q = korId ? String(korId) : trimmed.toLowerCase();
        setStatus("loading"); setErrorMsg("");
        try {
          const res = await fetch("https://pokeapi.co/api/v2/pokemon/" + encodeURIComponent(q));
          if (!res.ok) throw new Error("notfound");
          const pokemon = await res.json();
          let korName = null;
          try {
            const sres = await fetch(pokemon.species.url);
            if (sres.ok) {
              const species = await sres.json();
              korName = species.names?.find(n => n.language.name === "ko")?.name || null;
            }
          } catch(_) {}
          setData({ ...pokemon, korName });
          setStatus("done");
        } catch(e) {
          setData(null); setStatus("error");
          setErrorMsg("‘"+raw+"’ 없음. 한글·영문명/번호(1~1025)");
        }
      }

      function onSubmit(e){ e.preventDefault(); search(query); }
      function randomPokemon(){ const id = Math.floor(Math.random()*1025)+1; setQuery(String(id)); search(id); }
      function step(delta){
        const cur = data?.id || 0;
        const next = Math.min(1025, Math.max(1, cur + delta));
        setQuery(String(next)); search(next);
      }

      return (
        <div className="w-full max-w-3xl">
          {/* 본체 */}
          <div className="dex-shell relative rounded-[26px] p-3 sm:p-5">
            {/* 상단 데코 바 */}
            <div className="mb-3 flex items-center gap-3 px-1">
              <div className="big-lens relative h-12 w-12 rounded-full sm:h-14 sm:w-14" />
              <div className="flex gap-2">
                <span className="led blink h-3 w-3 rounded-full bg-[#f04545] text-[#f04545]" />
                <span className="led h-3 w-3 rounded-full bg-[#f5c542] text-[#f5c542]" />
                <span className="led h-3 w-3 rounded-full bg-[#46c84a] text-[#46c84a]" />
              </div>
              <div className="ml-auto pr-1">
                <div className="lcd-font text-[11px] font-extrabold tracking-widest text-white/90 drop-shadow">POKÉDEX</div>
              </div>
            </div>

            {/* 본체 2단 그리드 */}
            <div className="flex flex-col gap-3 sm:flex-row sm:gap-0">
              {/* 좌측 패널 */}
              <div className="rounded-2xl bg-[#c42424]/50 p-3 shadow-inner sm:flex-1">
                <MainScreen status={status} data={data} errorMsg={errorMsg} />
                {/* 스피커/디테일 */}
                <div className="mt-3 flex items-center justify-between px-1">
                  <div className="flex h-9 w-9 items-center justify-center rounded-full bg-[#9bbc0f] shadow-inner">
                    <span className="led h-5 w-5 rounded-full bg-[#c8e84a] text-[#c8e84a]" />
                  </div>
                  <div className="space-y-[3px]">
                    {[0,1,2,3].map(i => <div key={i} className="speaker-line h-1 w-16 rounded-full" />)}
                  </div>
                </div>
              </div>

              {/* 경첩 */}
              <div className="hidden w-3 sm:block hinge mx-1 rounded" />

              {/* 우측 패널 */}
              <div className="rounded-2xl bg-[#c42424]/50 p-3 shadow-inner sm:w-[46%]">
                <DataScreen status={status} data={data} />

                {/* 검색 입력 */}
                <form onSubmit={onSubmit} className="mt-3 flex gap-1.5">
                  <input
                    ref={inputRef}
                    value={query}
                    onChange={(e)=>setQuery(e.target.value)}
                    placeholder="피카츄 / pikachu / 25"
                    className="lcd-font min-w-0 flex-1 rounded-md border-2 border-[#7a1010] bg-[#1b1e26] px-2.5 py-2 text-xs font-bold text-[#9bbc0f] outline-none placeholder:text-[#5c7a08] focus:border-[#f5c542]"
                  />
                  <button type="submit"
                    className="key-btn rounded-md bg-[#2196f3] px-3 py-2 text-xs font-extrabold text-white">검색</button>
                </form>

                {/* 컨트롤 영역: 십자키 + 버튼 */}
                <div className="mt-3 flex items-center justify-between">
                  {/* 십자 방향키 (이전/다음) */}
                  <div className="relative h-[68px] w-[68px]">
                    <div className="dpad absolute left-1/2 top-0 h-5 w-6 -translate-x-1/2 rounded-t" />
                    <div className="dpad absolute bottom-0 left-1/2 h-5 w-6 -translate-x-1/2 rounded-b" />
                    <button onClick={()=>step(-1)} title="이전 도감"
                      className="dpad absolute left-0 top-1/2 flex h-6 w-5 -translate-y-1/2 items-center justify-center rounded-l text-white active:brightness-125">◀</button>
                    <button onClick={()=>step(1)} title="다음 도감"
                      className="dpad absolute right-0 top-1/2 flex h-6 w-5 -translate-y-1/2 items-center justify-center rounded-r text-white active:brightness-125">▶</button>
                    <div className="dpad absolute left-1/2 top-1/2 h-6 w-6 -translate-x-1/2 -translate-y-1/2 rounded-sm" />
                  </div>

                  {/* 액션 버튼 */}
                  <div className="flex flex-col items-end gap-2">
                    <button onClick={randomPokemon}
                      className="round-btn flex h-12 w-12 items-center justify-center rounded-full bg-[#f5c542] text-xl active:brightness-110" title="랜덤 포켓몬">🎲</button>
                    <div className="flex gap-2">
                      <button onClick={()=>{ setData(null); setStatus("idle"); setQuery(""); inputRef.current?.focus(); }}
                        className="round-btn h-6 w-6 rounded-full bg-[#e74c3c]" title="초기화" />
                      <button onClick={()=>step(1)}
                        className="round-btn h-6 w-6 rounded-full bg-[#2ecc71]" title="다음" />
                    </div>
                  </div>
                </div>

                {/* 빠른 검색 칩 (한글) */}
                <div className="mt-3 grid grid-cols-3 gap-1.5">
                  {["피카츄","이상해씨","파이리","꼬부기","이브이","뮤츠"].map(name => (
                    <button key={name} onClick={()=>{ setQuery(name); search(name); }}
                      className="key-btn lcd-font truncate rounded bg-[#3a3f47] px-1.5 py-1 text-[10px] font-bold text-[#9bbc0f] active:brightness-125">
                      {name}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <p className="lcd-font mt-4 text-center text-[11px] text-white/40">
            데이터 · <a href="https://pokeapi.co" target="_blank" className="underline">PokeAPI</a> · 포켓컴 디자인
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
