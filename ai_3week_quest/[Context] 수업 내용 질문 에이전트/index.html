<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📘 수업 내용 질문 에이전트</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes popIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .pop-in { animation: popIn 0.18s ease-out; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }
    .dot { animation: blink 1.2s infinite both; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    .chat-scroll::-webkit-scrollbar { width: 8px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 8px; }
    body { background: #f2f4f6; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const API_BASE_URL = '/api';

    // ── 세션(메모리) 관리: localStorage에 sessionId 보관 ──
    const SID_KEY = 'class-qa-session-id';
    function loadOrCreateSessionId() {
      // URL에 ?sid=... 가 있으면 그 세션을 사용(공유/데모용)
      const urlSid = new URLSearchParams(location.search).get('sid');
      if (urlSid) { localStorage.setItem(SID_KEY, urlSid); return urlSid; }
      let sid = localStorage.getItem(SID_KEY);
      if (!sid) {
        sid = (crypto.randomUUID ? crypto.randomUUID() : 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2));
        localStorage.setItem(SID_KEY, sid);
      }
      return sid;
    }

    // ── 응답 파싱: { error } 형태면 에러 throw ──
    async function parseResponse(res) {
      let data = {};
      try { data = await res.json(); } catch (_) {}
      if (!res.ok || data.error) {
        throw new Error(data.error || ('요청 실패 (HTTP ' + res.status + ')'));
      }
      return data;
    }

    const EXAMPLE_QUESTIONS = [
      '왜 API 키를 서버에 숨겨야 해?',
      'fetch로 API 호출하는 방법 알려줘',
      '더치페이 계산기 코드 보여줘',
      '아까 물어본 거랑 연결해서 설명해줘',
    ];

    // ── 아주 가벼운 마크다운 렌더링 (코드블록 + 인라인코드 + 줄바꿈) ──
    function renderMarkdown(text) {
      const blocks = [];
      const re = /```(\w+)?\n?([\s\S]*?)```/g;
      let last = 0, m, key = 0;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) blocks.push(renderInline(text.slice(last, m.index), key++));
        const lang = m[1] || '';
        const code = m[2].replace(/\n$/, '');
        blocks.push(
          <div key={key++} className="my-2 rounded-xl overflow-hidden border border-gray-700">
            {lang && <div className="px-3 py-1 text-xs text-gray-300 bg-gray-800 border-b border-gray-700">{lang}</div>}
            <pre className="bg-gray-900 text-gray-100 text-[13px] leading-relaxed p-3 overflow-x-auto"><code>{code}</code></pre>
          </div>
        );
        last = re.lastIndex;
      }
      if (last < text.length) blocks.push(renderInline(text.slice(last), key++));
      return blocks;
    }
    function renderInline(chunk, key) {
      // `inline code` 처리
      const parts = chunk.split(/(`[^`]+`)/g).map((p, i) => {
        if (p.startsWith('`') && p.endsWith('`') && p.length > 1) {
          return <code key={i} className="px-1.5 py-0.5 rounded bg-gray-100 text-pink-600 text-[13px]">{p.slice(1, -1)}</code>;
        }
        return p;
      });
      return <div key={key} className="whitespace-pre-wrap break-words">{parts}</div>;
    }

    function App() {
      const [sessionId, setSessionId] = useState(loadOrCreateSessionId);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [sending, setSending] = useState(false);
      const [ctx, setCtx] = useState(null);
      const [ctxOpen, setCtxOpen] = useState(false);
      const [error, setError] = useState('');
      const scrollRef = useRef(null);

      // 참조 자료 목록 로딩
      useEffect(() => {
        fetch(`${API_BASE_URL}/context`).then(parseResponse).then(setCtx).catch(() => {});
      }, []);

      // 이전 대화 복원
      useEffect(() => {
        fetch(`${API_BASE_URL}/history?sessionId=${encodeURIComponent(sessionId)}`)
          .then(parseResponse)
          .then((d) => setMessages(d.messages || []))
          .catch(() => {});
      }, [sessionId]);

      // 자동 스크롤
      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages, sending]);

      const send = useCallback(async (text) => {
        const q = (text != null ? text : input).trim();
        if (!q || sending) return;
        setError('');
        setInput('');
        setMessages((prev) => [...prev, { role: 'user', content: q }]);
        setSending(true);
        try {
          const data = await parseResponse(
            await fetch(`${API_BASE_URL}/chat`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sessionId, message: q }),
            })
          );
          if (data.sessionId && data.sessionId !== sessionId) {
            localStorage.setItem(SID_KEY, data.sessionId);
            setSessionId(data.sessionId);
          }
          setMessages((prev) => [...prev, { role: 'assistant', content: data.reply }]);
        } catch (e) {
          setError(e.message);
          setMessages((prev) => prev.slice(0, -1)); // 실패 시 방금 보낸 질문 롤백
          setInput(q);
        } finally {
          setSending(false);
        }
      }, [input, sending, sessionId]);

      const reset = useCallback(async () => {
        try { await fetch(`${API_BASE_URL}/reset`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId }) }); } catch (_) {}
        const sid = crypto.randomUUID ? crypto.randomUUID() : 'sess_' + Date.now();
        localStorage.setItem(SID_KEY, sid);
        setSessionId(sid);
        setMessages([]);
        setError('');
      }, [sessionId]);

      const onKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      };

      const totalFiles = ctx ? (ctx.textFiles.length + ctx.codeFiles.length) : 0;

      return (
        <div className="min-h-screen flex flex-col items-center px-3 py-4 sm:py-6">
          <div className="w-full max-w-2xl flex flex-col" style={{ height: 'calc(100vh - 2rem)' }}>

            {/* 헤더 */}
            <div className="bg-white rounded-2xl shadow-sm px-5 py-4 mb-3">
              <div className="flex items-start justify-between gap-2">
                <div>
                  <h1 className="text-xl font-bold text-gray-900">📘 수업 내용 질문 에이전트</h1>
                  <p className="text-sm text-gray-500 mt-0.5">하버스쿨 AI 교육 — 수업 노트와 실습 코드를 기억하는 나만의 도우미</p>
                </div>
                <button onClick={reset} className="shrink-0 text-sm text-gray-500 hover:text-gray-900 border border-gray-200 rounded-lg px-2.5 py-1.5 hover:bg-gray-50 transition">🔄 대화 초기화</button>
              </div>
              <div className="flex items-center gap-2 mt-3 flex-wrap">
                <span className="inline-flex items-center gap-1 text-xs font-medium text-emerald-700 bg-emerald-50 rounded-full px-2.5 py-1">🧠 메모리 ON — 이전 대화를 기억해요</span>
                {ctx && (ctx.mode === 'ai'
                  ? <span className="inline-flex items-center gap-1 text-xs font-medium text-violet-700 bg-violet-50 rounded-full px-2.5 py-1">🤖 AI 모드 (Claude)</span>
                  : <span className="inline-flex items-center gap-1 text-xs font-medium text-blue-700 bg-blue-50 rounded-full px-2.5 py-1">🔌 오프라인 — 수업 자료 기반 (키 불필요)</span>
                )}
                <span className="text-[11px] text-gray-400">세션 {String(sessionId).slice(0, 8)}…</span>
              </div>
            </div>

            {/* 참조 자료 패널 */}
            <div className="bg-white rounded-2xl shadow-sm mb-3">
              <button onClick={() => setCtxOpen((v) => !v)} className="w-full flex items-center justify-between px-5 py-3 text-left">
                <span className="text-sm font-semibold text-gray-800">📚 참조 중인 수업 자료 {ctx && <span className="text-gray-400 font-normal">· {totalFiles}개 · {ctx.totalChars.toLocaleString()}자</span>}</span>
                <span className="text-gray-400 text-xs">{ctxOpen ? '▲ 접기' : '▼ 펼치기'}</span>
              </button>
              {ctxOpen && ctx && (
                <div className="px-5 pb-4 grid sm:grid-cols-2 gap-4 border-t border-gray-100 pt-3">
                  <div>
                    <div className="text-xs font-semibold text-gray-500 mb-1.5">📝 텍스트 자료 ({ctx.textFiles.length})</div>
                    <ul className="space-y-1">
                      {ctx.textFiles.map((f) => (
                        <li key={f.name} className="text-[13px] text-gray-700 flex justify-between gap-2"><span className="truncate">{f.name}</span><span className="text-gray-400 shrink-0">{f.chars.toLocaleString()}자</span></li>
                      ))}
                    </ul>
                  </div>
                  <div>
                    <div className="text-xs font-semibold text-gray-500 mb-1.5">💻 실습 코드 ({ctx.codeFiles.length})</div>
                    <ul className="space-y-1">
                      {ctx.codeFiles.map((f) => (
                        <li key={f.name} className="text-[13px] text-gray-700 flex justify-between gap-2"><span className="truncate">{f.name}</span><span className="text-gray-400 shrink-0">{f.chars.toLocaleString()}자</span></li>
                      ))}
                    </ul>
                  </div>
                </div>
              )}
            </div>

            {/* 채팅 영역 */}
            <div ref={scrollRef} className="chat-scroll flex-1 overflow-y-auto bg-white rounded-2xl shadow-sm p-4 space-y-3">
              {messages.length === 0 && !sending && (
                <div className="h-full flex flex-col items-center justify-center text-center px-4">
                  <div className="text-4xl mb-2">📘</div>
                  <p className="text-gray-600 font-medium">수업에서 배운 걸 물어보세요!</p>
                  <p className="text-gray-400 text-sm mt-1 mb-4">노트와 실습 코드를 근거로 답하고, 이전 대화도 기억해요.</p>
                  <div className="flex flex-wrap gap-2 justify-center">
                    {EXAMPLE_QUESTIONS.map((q) => (
                      <button key={q} onClick={() => send(q)} className="text-sm text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-full px-3 py-1.5 transition">{q}</button>
                    ))}
                  </div>
                </div>
              )}

              {messages.map((m, i) => (
                m.role === 'user' ? (
                  <div key={i} className="flex justify-end pop-in">
                    <div className="max-w-[85%] bg-blue-500 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-[15px] whitespace-pre-wrap break-words">{m.content}</div>
                  </div>
                ) : (
                  <div key={i} className="flex justify-start gap-2 pop-in">
                    <div className="shrink-0 w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-base">📘</div>
                    <div className="max-w-[85%] bg-gray-50 text-gray-800 rounded-2xl rounded-tl-sm px-4 py-2.5 text-[15px] leading-relaxed">{renderMarkdown(m.content)}</div>
                  </div>
                )
              ))}

              {sending && (
                <div className="flex justify-start gap-2">
                  <div className="shrink-0 w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-base">📘</div>
                  <div className="bg-gray-50 rounded-2xl rounded-tl-sm px-4 py-3 flex items-center gap-1.5 text-gray-400">
                    <span className="text-sm mr-1">생각 중</span>
                    <span className="dot w-1.5 h-1.5 rounded-full bg-gray-400 inline-block"></span>
                    <span className="dot w-1.5 h-1.5 rounded-full bg-gray-400 inline-block"></span>
                    <span className="dot w-1.5 h-1.5 rounded-full bg-gray-400 inline-block"></span>
                  </div>
                </div>
              )}
            </div>

            {error && <div className="mt-2 text-sm text-red-600 bg-red-50 rounded-xl px-4 py-2">⚠️ {error}</div>}

            {/* 입력창 */}
            <div className="mt-3 bg-white rounded-2xl shadow-sm p-2 flex items-end gap-2">
              <textarea
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={onKeyDown}
                rows={1}
                placeholder="수업 내용을 질문해보세요… (Enter 전송, Shift+Enter 줄바꿈)"
                className="flex-1 resize-none max-h-32 px-3 py-2 text-[15px] outline-none bg-transparent"
              />
              <button
                onClick={() => send()}
                disabled={sending || !input.trim()}
                className="shrink-0 bg-blue-500 text-white rounded-xl px-4 py-2 font-medium hover:bg-blue-600 disabled:bg-gray-200 disabled:text-gray-400 transition"
              >전송</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
