<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만 나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 가져오기
    // ========================================
    const { useState } = React;

    // ========================================
    // 만 나이 계산 함수 (순수 함수, 핵심 로직)
    //  - 오늘 날짜 기준
    //  - 생일이 지났으면      : 올해 - 출생연도
    //  - 생일이 아직 안 지났으면 : 올해 - 출생연도 - 1
    // ========================================
    function calculateAge(birthDateString) {
      const today = new Date();
      const birth = new Date(birthDateString);

      // 기본 계산: 올해 - 출생연도
      let age = today.getFullYear() - birth.getFullYear();

      // 올해 생일이 아직 안 지났으면 1살 빼기
      const isBirthdayPassed =
        today.getMonth() > birth.getMonth() ||
        (today.getMonth() === birth.getMonth() &&
          today.getDate() >= birth.getDate());

      if (!isBirthdayPassed) {
        age = age - 1;
      }

      return age;
    }

    // ========================================
    // App 컴포넌트
    //  흐름: input(onChange) -> 상태(useState) -> 버튼(onClick) -> 출력
    // ========================================
    function App() {
      // 1) 상태(State): 입력한 생년월일 / 계산된 나이 / 에러 메시지
      const [birthDate, setBirthDate] = useState("");   // 입력값
      const [age, setAge] = useState(null);             // 계산 결과
      const [error, setError] = useState("");           // 에러 메시지

      // 2) input 이벤트(onChange): 입력값이 바뀔 때 상태 업데이트
      const handleChange = (event) => {
        setBirthDate(event.target.value);
      };

      // 3) 버튼 이벤트(onClick): 검증 후 나이 계산
      const handleClick = () => {
        // 검증 1) 날짜를 입력하지 않은 경우
        if (!birthDate) {
          setError("생년월일을 입력해 주세요.");
          setAge(null);
          return;
        }

        // 검증 2) 미래 날짜를 입력한 경우
        const today = new Date();
        if (new Date(birthDate) > today) {
          setError("미래 날짜는 입력할 수 없어요. 다시 확인해 주세요.");
          setAge(null);
          return;
        }

        // 검증 통과 -> 나이 계산 후 결과 상태 저장
        setError("");
        setAge(calculateAge(birthDate));
      };

      // 4) 출력(렌더링)
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 sm:p-8">
            <h1 className="text-2xl font-bold text-slate-800 text-center mb-1">
              만 나이 계산기
            </h1>
            <p className="text-sm text-slate-500 text-center mb-6">
              생년월일을 입력하고 버튼을 눌러보세요.
            </p>

            {/* 입력 영역 */}
            <label
              htmlFor="birth"
              className="block text-sm font-medium text-slate-700 mb-2"
            >
              생년월일
            </label>
            <input
              id="birth"
              type="date"
              value={birthDate}
              onChange={handleChange}
              className="w-full border border-slate-300 rounded-lg px-4 py-2 mb-4
                         focus:outline-none focus:ring-2 focus:ring-blue-400"
            />

            {/* 계산 버튼 */}
            <button
              onClick={handleClick}
              className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                         rounded-lg py-3 transition-colors"
            >
              나이 계산하기
            </button>

            {/* 에러 메시지 출력 */}
            {error && (
              <p className="mt-4 text-center text-red-500 text-sm">
                {error}
              </p>
            )}

            {/* 결과 출력 */}
            {age !== null && !error && (
              <div className="mt-6 bg-blue-50 rounded-xl py-6 text-center">
                <p className="text-slate-600 mb-1">계산 결과</p>
                <p className="text-4xl font-bold text-blue-600">
                  만 {age}세
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
